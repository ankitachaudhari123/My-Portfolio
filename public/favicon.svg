<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Ankita Portfolio">
  <defs>
    <linearGradient id="pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>
  <rect x="24" y="24" width="464" height="464" rx="80" fill="none" stroke="url(#pink)" stroke-width="6" opacity="0.35"/>

  <!-- Corner accents -->
  <path d="M96 160 L96 96 L160 96" fill="none" stroke="#ec4899" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <path d="M416 352 L416 416 L352 416" fill="none" stroke="#ec4899" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

  <!-- Code brackets -->
  <text x="148" y="300" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="108" font-weight="700" fill="#737373">&lt;</text>
  <text x="360" y="300" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="108" font-weight="700" fill="#737373">/&gt;</text>

  <!-- Letter A -->
  <text x="256" y="310" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="200" font-weight="800" fill="url(#pink)" text-anchor="middle" filter="url(#glow)">A</text>

  <!-- Pink dot -->
  <circle cx="392" cy="136" r="18" fill="#ff2d95" opacity="0.9"/>
</svg>
